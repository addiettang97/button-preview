<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>按钮交互预览</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <div>
          <h1>按钮</h1>
        </div>
        <div class="hero__meta">
          <p>addietang</p>
          <p>2025.10.26 修订</p>
        </div>
        <div class="hero__mark" aria-hidden="true"></div>
      </header>

      <section class="panel" aria-labelledby="plan-title">
        <div class="section-head">
          <h2 id="plan-title">套餐包配置</h2>
          <span class="status-pill" id="plan-status">当前: 包年包月</span>
        </div>

        <div class="group">
          <p class="group__title">有 icon</p>
          <div class="plan-grid" role="tablist" aria-label="套餐包配置">
            <div class="spec-item">
              <p class="spec-item__label">normal</p>
              <button class="plan-card" type="button" data-plan="normal-icon">
                <span class="finance-icon" aria-hidden="true">
                  <span class="finance-icon__ring finance-icon__ring-back"></span>
                  <span class="finance-icon__ring finance-icon__ring-front"></span>
                  <span class="finance-icon__plus finance-icon__plus-horizontal"></span>
                  <span class="finance-icon__plus finance-icon__plus-vertical"></span>
                  <span class="finance-icon__bar finance-icon__bar-top-left"></span>
                  <span class="finance-icon__bar finance-icon__bar-top-right"></span>
                  <span class="finance-icon__bar finance-icon__bar-middle"></span>
                  <span class="finance-icon__bar finance-icon__bar-bottom"></span>
                  <span class="finance-icon__bar finance-icon__bar-center"></span>
                </span>
                <span class="plan-card__text">
                  <strong>包年包月</strong>
                  <span>适用需求量长期稳定的业务</span>
                </span>
              </button>
            </div>

            <div class="spec-item">
              <p class="spec-item__label">Active（选中）</p>
              <button class="plan-card is-selected" type="button" data-plan="active-icon" aria-pressed="true">
                <span class="finance-icon" aria-hidden="true">
                  <span class="finance-icon__ring finance-icon__ring-back"></span>
                  <span class="finance-icon__ring finance-icon__ring-front"></span>
                  <span class="finance-icon__plus finance-icon__plus-horizontal"></span>
                  <span class="finance-icon__plus finance-icon__plus-vertical"></span>
                  <span class="finance-icon__bar finance-icon__bar-top-left"></span>
                  <span class="finance-icon__bar finance-icon__bar-top-right"></span>
                  <span class="finance-icon__bar finance-icon__bar-middle"></span>
                  <span class="finance-icon__bar finance-icon__bar-bottom"></span>
                  <span class="finance-icon__bar finance-icon__bar-center"></span>
                </span>
                <span class="plan-card__text">
                  <strong>包年包月</strong>
                  <span>适用需求量长期稳定的业务</span>
                </span>
              </button>
            </div>

            <div class="spec-item">
              <p class="spec-item__label">hover</p>
              <button class="plan-card is-hover-demo" type="button" data-plan="hover-icon">
                <span class="finance-icon" aria-hidden="true">
                  <span class="finance-icon__ring finance-icon__ring-back"></span>
                  <span class="finance-icon__ring finance-icon__ring-front"></span>
                  <span class="finance-icon__plus finance-icon__plus-horizontal"></span>
                  <span class="finance-icon__plus finance-icon__plus-vertical"></span>
                  <span class="finance-icon__bar finance-icon__bar-top-left"></span>
                  <span class="finance-icon__bar finance-icon__bar-top-right"></span>
                  <span class="finance-icon__bar finance-icon__bar-middle"></span>
                  <span class="finance-icon__bar finance-icon__bar-bottom"></span>
                  <span class="finance-icon__bar finance-icon__bar-center"></span>
                </span>
                <span class="plan-card__text">
                  <strong>包年包月</strong>
                  <span>适用需求量长期稳定的业务</span>
                </span>
              </button>
            </div>

            <div class="spec-item">
              <p class="spec-item__label">disabled</p>
              <button class="plan-card is-disabled" type="button" disabled>
                <span class="finance-icon finance-icon-disabled" aria-hidden="true">
                  <span class="finance-icon__ring finance-icon__ring-back"></span>
                  <span class="finance-icon__ring finance-icon__ring-front"></span>
                  <span class="finance-icon__plus finance-icon__plus-horizontal"></span>
                  <span class="finance-icon__plus finance-icon__plus-vertical"></span>
                  <span class="finance-icon__bar finance-icon__bar-top-left"></span>
                  <span class="finance-icon__bar finance-icon__bar-top-right"></span>
                  <span class="finance-icon__bar finance-icon__bar-middle"></span>
                  <span class="finance-icon__bar finance-icon__bar-bottom"></span>
                  <span class="finance-icon__bar finance-icon__bar-center"></span>
                </span>
                <span class="plan-card__text">
                  <strong>包年包月</strong>
                  <span>适用需求量长期稳定的业务</span>
                </span>
              </button>
            </div>
          </div>
        </div>

        <div class="group">
          <p class="group__title">无 icon</p>
          <div class="plan-grid" aria-label="无图标套餐包配置">
            <button class="plan-card" type="button" data-plan="normal-noicon">
              <span class="plan-card__text">
                <strong>包年包月</strong>
                <span>适用需求量长期稳定的业务</span>
              </span>
            </button>
            <button class="plan-card is-selected" type="button" data-plan="active-noicon">
              <span class="plan-card__text">
                <strong>包年包月</strong>
                <span>适用需求量长期稳定的业务</span>
              </span>
            </button>
            <button class="plan-card is-hover-demo" type="button" data-plan="hover-noicon">
              <span class="plan-card__text">
                <strong>包年包月</strong>
                <span>适用需求量长期稳定的业务</span>
              </span>
            </button>
            <button class="plan-card is-disabled" type="button" disabled>
              <span class="plan-card__text">
                <strong>包年包月</strong>
                <span>适用需求量长期稳定的业务</span>
              </span>
            </button>
          </div>
        </div>
      </section>

      <section class="panel" aria-labelledby="tab-title">
        <div class="section-head">
          <h2 id="tab-title">选项卡按钮</h2>
          <span class="status-pill" id="tab-status">当前: Active</span>
        </div>
        <div class="tab-row" role="tablist" aria-label="选项卡按钮">
          <button class="tab-chip" type="button" data-tab="normal">Normal</button>
          <button class="tab-chip" type="button" data-tab="hover">Hover</button>
          <button class="tab-chip is-active" type="button" data-tab="active" aria-selected="true">Active</button>
          <button class="tab-chip is-disabled" type="button" disabled>Disabled</button>
        </div>
      </section>

      <section class="panel" aria-labelledby="button-title">
        <div class="section-head">
          <div>
            <h2 id="button-title">常规按钮</h2>
            <p class="section-note">这部分和 TEA 一致</p>
          </div>
          <span class="status-pill" id="button-status">等待操作</span>
        </div>
        <div class="button-grid">
          <button class="btn btn-primary" type="button" data-message="点击了一级按钮">一级按钮</button>
          <button class="btn btn-primary is-hover-demo" type="button" data-message="点击了一级按钮 Hover">一级按钮</button>
          <button class="btn btn-primary is-active-demo" type="button" data-message="点击了一级按钮 Active">一级按钮</button>
          <button class="btn btn-primary is-disabled" type="button" disabled>一级按钮</button>
          <button class="btn btn-secondary" type="button" data-message="点击了二级按钮">二级按钮</button>
          <button class="btn btn-secondary is-hover-demo" type="button" data-message="点击了二级按钮 Hover">二级按钮</button>
          <button class="btn btn-secondary is-active-demo" type="button" data-message="点击了二级按钮 Active">二级按钮</button>
          <button class="btn btn-secondary is-disabled" type="button" disabled>二级按钮</button>
        </div>
      </section>

      <section class="panel" aria-labelledby="step-title">
        <div class="section-head">
          <h2 id="step-title">步骤按钮</h2>
          <span class="status-pill" id="step-status">步骤 1 / 3</span>
        </div>
        <div class="step-grid">
          <div class="spec-item">
            <p class="spec-item__label">normal</p>
            <div class="stepper">
              <button class="btn btn-step-secondary" id="prev-step" type="button">上一步</button>
              <button class="btn btn-step-primary" id="next-step" type="button">下一步</button>
            </div>
          </div>
          <div class="spec-item">
            <p class="spec-item__label">主按钮 hover</p>
            <div class="stepper">
              <button class="btn btn-step-secondary" type="button">上一步</button>
              <button class="btn btn-step-primary is-hover-demo" type="button">下一步</button>
            </div>
          </div>
          <div class="spec-item">
            <p class="spec-item__label">主按钮 disabled</p>
            <div class="stepper">
              <button class="btn btn-step-secondary" type="button">上一步</button>
              <button class="btn btn-step-primary is-disabled" type="button" disabled>下一步</button>
            </div>
          </div>
          <div class="spec-item">
            <p class="spec-item__label">次按钮 hover</p>
            <div class="stepper">
              <button class="btn btn-step-secondary is-hover-demo" type="button">上一步</button>
              <button class="btn btn-step-primary" type="button">下一步</button>
            </div>
          </div>
          <div class="spec-item">
            <p class="spec-item__label">次按钮 disabled</p>
            <div class="stepper">
              <button class="btn btn-step-secondary is-disabled" type="button" disabled>上一步</button>
              <button class="btn btn-step-primary" type="button">下一步</button>
            </div>
          </div>
        </div>
      </section>

      <section class="panel panel-console" aria-labelledby="console-title">
        <div class="section-head">
          <h2 id="console-title">交互日志</h2>
        </div>
        <div class="console" id="console-output">页面已就绪，可开始点击预览。</div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
